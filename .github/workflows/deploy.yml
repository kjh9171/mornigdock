name: AGORA Base Deployment (Cloudflare Workers & Pages)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ 기지 코드 보급 (Checkout)
        uses: actions/checkout@v4

      - name: 🏗️ Node.js 환경 구축
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 의존성 설치 및 프론트엔드 빌드
        run: |
          npm install
          cd backend && npm install
          cd ../frontend && npm install
          # 프론트엔드 빌드 시 API URL 환경 변수 주입
          VITE_API_URL=${{ secrets.VITE_API_URL }} npm run build

      - name: 🚀 백엔드 전개 (Cloudflare Workers)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'backend'
          command: deploy

      - name: 🚀 프론트엔드 전개 (Cloudflare Pages)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'frontend'
          command: pages deploy dist --project-name=mornigdock-frontend

      - name: 📋 배포 성공 보고
        run: echo "필승! 아고라 기지 시스템이 Cloudflare 전력망에 성공적으로 전개되었습니다!"
